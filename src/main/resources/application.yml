spring:
  jpa:
#    show-sql: true      # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true  # 보기 좋게 포맷팅
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console  # jar 실행후 H2 콘솔 볼 수 있게
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
