# ────────────────────────────────────────────────
# 부하 테스트용: 이 값을 바꿔가며 스레드 수 vs 메모리/TPS 비교
# 50 → 200 → 500 → 1000 으로 올려가며 측정
# ────────────────────────────────────────────────
noti:
  worker:
    threads: 200

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics, threaddump
  endpoint:
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

spring:
  jpa:
#    show-sql: true      # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true  # 보기 좋게 포맷팅
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console  # jar 실행후 H2 콘솔 볼 수 있게
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
