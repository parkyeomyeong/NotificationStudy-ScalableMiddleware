#  level:
#    org.hibernate.SQL: debug           # SQL 쿼리 출력
#    org.hibernate.type.descriptor.sql: trace # 파라미터 값까지 출력
#    org.hibernate.orm.jdbc.bind: trace   # 파라미터 값까지 보려면 이거!